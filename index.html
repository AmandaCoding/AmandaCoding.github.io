<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amanda | AI & Data Science Portfolio</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212; /* Dark Mode Background */
            color: #E0E0E0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Portfolio Container Card */
        .portfolio-card {
            background-color: #1E1E1E;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 4px solid #00E676; /* Accent color line */
        }

        h1 {
            color: #FFFFFF;
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        .subtitle {
            color: #00E676; /* Bright cyan/green accent */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        p {
            line-height: 1.6;
            color: #A0A0A0;
            margin-bottom: 30px;
        }

        /* Buttons/Links */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 12px;
            background-color: #2D2D2D;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid #444444;
        }

        .btn:hover {
            background-color: #00E676;
            color: #121212;
            border-color: #00E676;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="portfolio-card">
        <h1>Amanda Nim S</h1>
        <div class="subtitle">AI & Data Science Student</div>
        
        <p>
            Welcome to my personal space. I'm a developer focusing on building intelligent systems, working with data analytics pipelines, and tinkering with smart hardware automation interfaces.
        </p>

        <div class="links-container">
            <a href="https://github.com" target="_blank" class="btn">🪐 View My GitHub Projects</a>
            <a href="https://kaggle.com" target="_blank" class="btn">📊 Check Out My Kaggle Notebooks</a>
        </div>
    </div>

</body>
</html>
