<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amanda | AI & Data Science Portfolio</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212; /* Sleek Dark Theme */
            color: #E0E0E0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Portfolio Container Card */
        .portfolio-card {
            background-color: #1E1E1E;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            max-width: 480px;
            width: 90%;
            text-align: center;
            border-top: 4px solid #00E676; /* Accent Border */
        }

        h1 {
            color: #FFFFFF;
            margin: 0 0 5px 0;
            font-size: 2.2rem;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #00E676; /* Neon Green Accent */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        p {
            line-height: 1.6;
            color: #B0B0B0;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* Interactive Buttons Matrix */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            background-color: #252525;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: Immersive Transition 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #333333;
        }

        /* Dynamic Hover States */
        .btn:hover {
            background-color: #00E676;
            color: #121212;
            border-color: #00E676;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3);
        }

        /* SVG Icon styling */
        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
